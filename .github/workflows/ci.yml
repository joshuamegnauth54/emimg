name: Build and test emimg

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

jobs:
  formatting:
    name: Check formatting
    runs-on: ubuntu-latest
    steps:
        - uses: actions/checkout@v7
        - uses: dtolnay/rust-toolchain@master
        - run: cargo fmt --all --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
      - uses: Swatinem/rust-cache@v2
      - uses: davidlattimore/wild-action@latest
      - uses: dtolnay/rust-toolchain@master
      - uses: ./.github/actions/install-linux-deps
      - run: cargo clippy --all-targets

  linux-no-libc:
    name: Linux (no libc)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
      - uses: Swatinem/rust-cache@v2
      - uses: davidlattimore/wild-action@latest
      - uses: dtolnay/rust-toolchain@master
      - uses: ./.github/actions/install-linux-deps
      - run: cargo test

  linux-libc:
    name: Linux (libc)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
      - uses: Swatinem/rust-cache@v2
      - uses: davidlattimore/wild-action@latest
      - uses: dtolnay/rust-toolchain@master
      - uses: ./.github/actions/install-linux-deps
      - run: cargo test --no-default-features --features=default-rust-libc

  macos:
    name: macOS
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v7
      - uses: Swatinem/rust-cache@v2
      - uses: dtolnay/rust-toolchain@master
      - run: cargo test --all-features

  windows:
    name: Windows
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@master
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --all-features

  freebsd:
    name: FreeBSD
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
      - uses: vmactions/freebsd-vm@v1
        with:
          usesh: true
          prepare: pkg install -y pkg-config rust seatd wayland xorg
          run: cargo test --all-features
