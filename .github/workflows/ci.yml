name: Build and test emimg

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

jobs:
  formatting:
    name: Check formatting
    runs-on: ubuntu-latest
    steps:
        - uses: actions/checkout@v7
        - uses: dtolnay/rust-toolchain@nightly
          with:
            components: rustfmt
        - run: cargo fmt --all --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
      - uses: Swatinem/rust-cache@v2
      - uses: davidlattimore/wild-action@latest
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: clippy
      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y \
            pkg-config \
            wayland-client \
            wayland-dev \
            libx11-dev
      - run: cargo clippy --all-targets --all-features

  linux:
    name: Linux
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
      - uses: Swatinem/rust-cache@v2
      - uses: davidlattimore/wild-action@latest
      - uses: dtolnay/rust-toolchain@nightly
      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y \
            pkg-config \
            wayland-client \
            wayland-dev \
            libx11-dev
      - run: cargo test --all-features

  macos:
    name: macOS
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v7
      - uses: Swatinem/rust-cache@v2
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test --all-features

  windows:
    name: Windows
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --all-features

  freebsd:
    name: FreeBSD
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
      - uses: vmactions/freebsd-vm@v1
        with:
          usesh: true
          prepare: pkg install -y rust seatd wayland xorg
          run: cargo test --all-features
